# keymaps
unbind %
bind | split-window -h -c "#{pane_current_path}"

unbind '"'
bind - split-window -v -c "#{pane_current_path}"

unbind r
bind r source-file ~/.config/tmux/tmux.conf

bind-key x kill-pane

#unbind C-b
#set -g prefix C-Space

bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5
bind -r m resize-pane -Z

set -g default-terminal "tmux-256color"
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g mouse on
set -g mode-keys vi
set -sg escape-time 10 # make delay shorter

### Copy Mode
bind-key -T copy-mode-vi 'v' send -X begin-selection # start selecting text with "v"
bind-key -T copy-mode-vi 'y' send -X copy-selection # copy text with "y"


### Plugins 
# tmux-yank 插件（系统剪贴板支持）
run-shell "${XDG_CONFIG_HOME}/tmux/plugins/tmux-yank/yank.tmux"

# vim-tmux-navigator 插件（无缝窗口导航）
run-shell "${XDG_CONFIG_HOME}/tmux/plugins/vim-tmux-navigator/vim-tmux-navigator.tmux"

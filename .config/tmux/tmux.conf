# ==========================
# 快捷键与基础设置 (Keymaps & Basics)
# ==========================

# 释放难按的 C-b，改为 C-Space（更符合人体工学，大拇指直达）
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# 重新加载配置文件
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Tmux config reloaded!"

# 更直观的面板分割 (Split window)
unbind %
bind | split-window -h -c "#{pane_current_path}"
unbind '"'
bind - split-window -v -c "#{pane_current_path}"

# 关闭面板 (免确认提升效率，如果不习惯可以去掉结尾的无提示参数)
bind-key x kill-pane

# 面板调整大小 (Resize panes)
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5
bind -r m resize-pane -Z

# 基础显示与终端配置
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB" # 开启真色彩支持 (修复 Vim/Nvim 主题偏色)
set -g base-index 1           # 窗口编号从 1 开始
set -g pane-base-index 1      # 面板编号从 1 开始
set -g renumber-windows on    # 关掉某个窗口后，自动重排编号
set -g mouse on               # 开启鼠标支持
set -sg escape-time 10        # 消除 Vim 中的 Esc 延迟

# ==========================
# 复制模式 (Copy Mode)
# ==========================
set -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel # 复制后自动退出选择模式

# ==========================
# 状态栏美化 (Aesthetics / UI)
# ==========================
set-option -g status-position top        # 状态栏移到顶部（现代感更强，且不遮挡底部终端输入）
set -g status-style bg=default,fg=white  # 状态栏背景透明，文字默认白色
set -g status-justify centre             # 窗口列表居中显示

# 窗口（Window）的标签样式
setw -g window-status-format " #I:#W "
setw -g window-status-current-format "#[fg=#1e1e2e,bg=#89b4fa,bold] #I:#W " # 当前窗口高亮 (现代蓝黑配色)

# 状态栏左右侧信息
set -g status-left "#[fg=#89b4fa,bold] ❐ #S " # 左侧显示 Session 名字
set -g status-left-length 50
set -g status-right "#[fg=#a6adc8] %H:%M %d-%b " # 右侧显示时间和日期

# ==========================
# 插件管理 (Plugins via TPM)
# ==========================

# 核心插件管理器
set -g @plugin 'tmux-plugins/tpm'

# 实用功能插件
set -g @plugin 'christoomey/vim-tmux-navigator' # 与 Vim 无缝切换面板 (Ctrl+h/j/k/l)
set -g @plugin 'tmux-plugins/tmux-yank'         # 跨平台系统剪贴板支持

# 会话保存与恢复插件
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'                  # 启动 tmux 时自动恢复

# ==========================
# 初始化 TPM (必须保留在最后一行)
# ==========================
run '~/.config/tmux/plugins/tpm/tpm'